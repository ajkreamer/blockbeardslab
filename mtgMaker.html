<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MTG Maker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <style>
        #card {
            border: 0px;
            width: 1100px !important;
        }

        #cardControls {
            vertical-align: top;
            padding: 20px;
            text-align: center;
        }

        #cardArt {
            height: 880px !important;
            padding: 0px !important;
            width: 630px !important;
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="js/html2canvas.min.js"></script>
</head>

<body>
    <table id="card">
        <tr>
            <td id="cardControls">
                <div class="input-field">
                    <input type="file" id="backgroundImageInput" accept="image/*" style="display: none;">
                    <button class="btn left" onclick="document.getElementById('backgroundImageInput').click()">
                        Art
                    </button>

                    <button class="btn right" id="downloadButton">
                        Download
                    </button>
                </div>

                <div><br><br></div>

                <div class="input-field">
                    <input id="cardName" type="text">
                    <label for="cardName">Card Name</label>
                </div>
                <div class="input-field">
                    <input id="cardNameFontSize" type="number" min="8" max="72" value="24">
                    <label for="cardNameFontSize">Name Font Size</label>
                </div>

                <div class="input-field">
                    <input id="cardType" type="text">
                    <label for="cardType">Card Type</label>
                </div>
                <div class="input-field">
                    <input id="cardTypeFontSize" type="number" min="8" max="72" value="18">
                    <label for="cardTypeFontSize">Type Font Size</label>
                </div>
                
                <div class="input-field">
                    <textarea id="cardEffect" class="materialize-textarea"></textarea>
                    <label for="cardEffect">Card Effect</label>
                </div>
                <div class="input-field">
                    <input id="cardEffectFontSize" type="number" min="8" max="72" value="16">
                    <label for="cardEffectFontSize">Effect Font Size</label>
                </div>
                
                <div class="input-field">
                    <input id="powerToughness" type="text">
                    <label for="powerToughness">Power/Toughness</label>
                </div>
                <div class="input-field">
                    <input id="powerToughnessFontSize" type="number" min="8" max="72" value="20">
                    <label for="powerToughnessFontSize">P/T Font Size</label>
                </div>
            </td>
            <td id="cardArt">Card</td>
        </tr>
    </table>
</body>

</html>

<script>
    $(function () {
        // Handle background image file selection
        $('#backgroundImageInput').on('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imageUrl = event.target.result;
                    $('#cardArt').css({
                        'background-image': `url(${imageUrl})`,
                        'background-size': 'cover',
                        'background-position': 'center',
                        'background-repeat': 'no-repeat'
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle card download
        $('#downloadButton').on('click', function() {
            const cardArt = document.getElementById('cardArt');
            html2canvas(cardArt, {
                backgroundColor: null,
                scale: 2,
                useCORS: true
            }).then(function(canvas) {
                const cardName = $('#cardName').val() || 'mtg-card';
                const safeFileName = cardName.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.png';
                const link = document.createElement('a');
                link.download = safeFileName;
                link.href = canvas.toDataURL();
                link.click();
            }).catch(function(error) {
                console.error('Error capturing card:', error);
                alert('Error capturing card. Please try again.');
            });
        });
    });
</script>
