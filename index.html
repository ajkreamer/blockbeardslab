<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockbeards Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a1a 50%, #0c0c0c 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, rgb(0, 188, 212), rgb(255, 235, 59), rgb(233, 30, 99));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            margin-bottom: 2rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            color: #b0b0b0;
            letter-spacing: 0.05em;
        }

        .coming-soon {
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }
            to { text-shadow: 0 0 40px rgba(255, 255, 255, 0.5); }
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 3rem;
        }

        .notify-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .email-input {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        .email-input:focus {
            border-color: rgb(0, 188, 212);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .email-input::placeholder {
            color: #666;
        }

        .notify-btn {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, rgb(0, 188, 212), rgb(233, 30, 99));
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: translateY(0);
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .social-links {
            margin-top: 4rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .social-link {
            display: inline-block;
            padding: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .social-link:hover {
            background: rgba(78, 205, 196, 0.2);
            border-color: rgb(0, 188, 212);
            transform: translateY(-2px);
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle-cyan {
            background: rgb(0, 188, 212);
        }

        .particle-yellow {
            background: rgb(255, 235, 59);
        }

        .particle-magenta {
            background: rgb(233, 30, 99);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .coming-soon { font-size: 2.5rem; }
            .subtitle { font-size: 1.2rem; }
            .description { font-size: 1rem; }
            .notify-container { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <!-- <div class="particle" style="animation-delay: 0s;"></div>
        <div class="particle" style="animation-delay: 1s;"></div>
        <div class="particle" style="animation-delay: 2s;"></div>
        <div class="particle" style="animation-delay: 1.5s;"></div>
        <div class="particle" style="animation-delay: 0.5s;"></div>
        <div class="particle" style="animation-delay: 2.5s;"></div>
        <div class="particle" style="animation-delay: 1.2s;"></div>
        <div class="particle" style="animation-delay: 0.8s;"></div>
        <div class="particle" style="animation-delay: 1.8s;"></div> -->
    </div>

    <div class="container">
        <div class="logo">Blockbeard's Lab</div>
        
        <div class="coming-soon">Coming Soon</div>
        
        <div class="subtitle">Something amazing is brewing...</div>
        
        <div class="description">
            We're working hard to bring you an incredible experience. 
            Stay tuned for updates and be the first to know when we launch!
        </div>
        
        <!-- <div class="notify-container">
            <input type="email" class="email-input" placeholder="Enter your email address">
            <button class="notify-btn">Notify Me</button>
        </div> -->
        
        <div class="social-links">
            <a href="#" class="social-link">📧</a>
            <a href="#" class="social-link">🐦</a>
            <a href="#" class="social-link">📘</a>
            <a href="#" class="social-link">💼</a>
        </div>
    </div>

    <script>
        // Randomly create and position particles
        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.querySelector('.particles');
            const colorClasses = ['particle-cyan', 'particle-yellow', 'particle-magenta'];
            
            // Generate a random number of particles between 8 and 25
            const numParticles = Math.floor(Math.random() * 90) + 10;
            
            for (let i = 0; i < numParticles; i++) {
                // Create particle element
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random color
                const randomColorClass = colorClasses[Math.floor(Math.random() * colorClasses.length)];
                particle.classList.add(randomColorClass);
                
                // Random position
                const randomLeft = Math.floor(Math.random() * 95) + '%';
                const randomTop = Math.floor(Math.random() * 95) + '%';
                
                // Random animation delay
                const randomDelay = Math.random() + 's'; // 0-3 seconds
                
                // Apply styles
                particle.style.left = randomLeft;
                particle.style.top = randomTop;
                particle.style.animationDelay = randomDelay;
                
                // Add to container
                particlesContainer.appendChild(particle);
            }
        });

        // Add some interactivity
        document.querySelector('.notify-btn').addEventListener('click', function() {
            const email = document.querySelector('.email-input').value;
            if (email) {
                alert('Thanks for subscribing! We\'ll notify you when we launch.');
                document.querySelector('.email-input').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        });

        // Add enter key support for email input
        document.querySelector('.email-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.querySelector('.notify-btn').click();
            }
        });
    </script>
</body>
</html>
